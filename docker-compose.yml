services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - taskflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/taskflow
      DATABASE_USER: taskflow
      DATABASE_PASSWORD: taskflow
      JWT_SECRET: change-this-secret-to-at-least-256-bits-for-production-use-please
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  taskflow_pg_data:
