spring:
  application:
    name: taskflow
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskflow}
    username: ${DATABASE_USER:taskflow}
    password: ${DATABASE_PASSWORD:taskflow}
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        page-parameter: page
        size-parameter: size

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never

taskflow:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-256-bits-for-production-use-please}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    org.springframework.security: INFO
